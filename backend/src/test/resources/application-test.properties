spring.datasource.url=jdbc:h2:mem:scs_test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

app.jwt.issuer=scs-test
app.jwt.secret=TEST_SECRET_TEST_SECRET_TEST_SECRET_TEST_SECRET
app.jwt.access-token-ttl-seconds=60
app.jwt.refresh-token-ttl-seconds=300

