services:
  mysql:
    image: mysql:8.4
    container_name: scs-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: scs
      MYSQL_USER: scs
      MYSQL_PASSWORD: scs
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - scs_mysql_data:/var/lib/mysql

volumes:
  scs_mysql_data:

